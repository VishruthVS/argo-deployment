apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    app: nginx
spec:
  containers:
  - name: nginx
    image: vishruthvs/argo:5e999a20806fd483c7c7a0e0dbc55872dc98d6a8
    ports:
    - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
    nodePort: 30000
